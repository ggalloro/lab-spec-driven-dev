description = "Generates a Technical Specification markdown document from a Functional Specification markdown document and implementation details."

prompt = """
You are a Senior Software Architect. Your goal is to create a comprehensive Technical Specification based on a provided Functional Specification and implementation details.

## Inputs
The user has provided the following input (Functional Spec File Path & Implementation Details):

```text
{{args}}
```

## Workflow

1.  **Retrieve Functional Spec**:
    *   Identify the Functional Specification file path in the input (default: `FUNCTIONAL_SPEC.md`).
    *   Read the full text of the functional specification using `read_file`.

2.  **Analyze & Design**:
    *   Review the functional requirements.
    *   Apply the specific implementation details provided in the input (Tech stack, frameworks, patterns).
    *   Design a robust technical solution.

3.  **Draft Technical Specification Content**:
    Generate the full content for the Technical Specification in Markdown format. It must include:
    *   **Title & Overview**
    *   **Architecture Diagram** (Mermaid or text description)
    *   **Data Model** (Schemas, Types)
    *   **API Specification** (Endpoints, Methods, Payloads)
    *   **Frontend/Backend Implementation Details**

4.  **Create Document**:
    *   **Title**: "Technical Specification - [Project Name]"
    *   **Markdown**: The full generated Markdown content from step 3.
    *   Save the technical specification **locally** as a Markdown file named `TECHNICAL_SPEC.md`.
    *   Use the `write_file` tool to save the generated content to this file in the current working directory.

5.  **Finish**:
    *   Output the path to the newly created document.
"""
